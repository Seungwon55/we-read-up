<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/fragments/header.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" href="/css/fragments/nav.css">
    <link rel="stylesheet" href="/css/fragments/sidebar.css">
    <link rel="stylesheet" href="/css/myPage/my-page.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>





<div class="container">
    <div class="content">
        <div class="content-head">
            <div class="first-category">
                <span>홈 / 마이쇼핑</span>
            </div>

            <div class="titleArea">
                <h1>마이 쇼핑</h1>
            </div>

            <div class="dashboard">
                <div class="dashboard-user">
                    <div class="user-icon"><img src="https://img.echosting.cafe24.com/skin/base_ko_KR/member/img_member_default.gif" alt="사용자"></div>
                    <div class="user-info">
                        <p class="user-name">안녕하세요. 홍길동 님!</p>
                        <p class="user-grade">고객님의 회원등급은 <span class="grade">일반회원</span> 입니다.</p>
                    </div>
                </div>
                <div class="dashboard-items">
                    <div class="dashboard-item">
                        <div class="icon"><img src="/img/money-icon.png" alt="총적립금"></div>
                        <p class="amount">0원</p>
                        <p class="label">총적립금</p>
                    </div>
                    <a href="/myPage/couponList" class="dashboard-item">
                        <div class="icon"><img src="/img/coupon-icon.png" alt="쿠폰"></div>
                        <p class="amount">1개</p>
                        <p class="label">쿠폰</p>
                    </a>
                    <a href="/myPage/orderList" class="dashboard-item">
                        <div class="icon"><img src="/img/order-icon.png" alt="총주문"></div>
                        <p class="amount">0원 (0회)</p>
                        <p class="label">총주문</p>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="main-container">
    <!-- 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- 메인 컨텐츠 -->
    <main class="main-content">
        <h2>나의 주문처리 현황 <span>(최근 3개월 기준)</span></h2>

        <div class="order-status">
            <a href="#" class="status">
                <p class="count">0</p>
                <p class="label">입금전</p>
            </a>
            <span class="arrow">→</span>
            <a href="#" class="status">
                <p class="count">0</p>
                <p class="label">배송준비중</p>
            </a>
            <span class="arrow">→</span>
            <a href="#" class="status">
                <p class="count">0</p>
                <p class="label">배송중</p>
            </a>
            <span class="arrow">→</span>
            <a href="#" class="status">
                <p class="count">0</p>
                <p class="label">배송완료</p>
            </a>
        </div>

        <div class="order-details">
            <a href="#">취소: <strong>0</strong></a>
            <a href="#">교환: <strong>0</strong></a>
            <a href="#">반품: <strong>0</strong></a>
        </div>
    </main>
</div>





<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
